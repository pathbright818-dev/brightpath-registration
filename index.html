<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bright Path Academy | Admin Dashboard + Enrollment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #0A1628, #020A17);
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
      min-height: 100vh;
    }

    /* Main Container */
    .main-wrapper {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Tabs */
    .tabs-container {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .tab-btn.active {
      background: #F0A73A;
      color: #0A1628;
      box-shadow: 0 4px 12px rgba(240,167,58,0.3);
    }

    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.2);
    }

    /* Panels */
    .panel {
      display: none;
      background: #FFFFFF;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    }

    .panel.active-panel {
      display: block;
    }

    /* Admin Dashboard Table */
    .admin-header {
      background: linear-gradient(115deg, #0F2B3D, #1B4A6E);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-header h2 {
      color: white;
      font-weight: 700;
    }

    .export-btn {
      background: #F0A73A;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    .stats-cards {
      display: flex;
      gap: 1rem;
      padding: 1.2rem 2rem;
      background: #F8FBFE;
      border-bottom: 1px solid #E9F0F5;
      flex-wrap: wrap;
    }

    .stat-card {
      background: white;
      border-radius: 1rem;
      padding: 0.8rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #E9F0F5;
    }

    .table-responsive {
      overflow-x: auto;
      padding: 1rem 2rem 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    th, td {
      padding: 0.9rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid #E9F0F5;
    }

    th {
      background: #F1F5F9;
      font-weight: 700;
      color: #1F3E48;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background: #FEFBF5;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #e25c5c;
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* Enrollment Form Panel */
    .enrollment-form-panel {
      padding: 2rem;
      background: white;
    }

    .grid-double {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      color: #1B4A6E;
      display: block;
      margin-bottom: 0.4rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid #E2EDF2;
      border-radius: 1rem;
    }

    .program-switch {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
    }

    .pill {
      background: #F1F5F9;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }

    .pill.active {
      background: #1F6392;
      color: white;
    }

    .course-grid-select {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.6rem;
      max-height: 250px;
      overflow-y: auto;
      margin: 1rem 0;
    }

    .course-check {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem;
      background: #F9FCFE;
      border-radius: 0.8rem;
    }

    .submit-btn {
      background: #136B47;
      color: white;
      width: 100%;
      padding: 1rem;
      border-radius: 2rem;
      font-weight: 700;
      border: none;
      margin-top: 1rem;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .grid-double {
        grid-template-columns: 1fr;
      }
      .stats-cards {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="tabs-container">
    <button class="tab-btn active" data-tab="enroll">📝 አዲስ ምዝገባ</button>
    <button class="tab-btn" data-tab="admin">👑 የአድሚን ዳሽቦርድ</button>
  </div>

  <!-- ENROLLMENT PANEL -->
  <div id="enrollPanel" class="panel active-panel">
    <div class="enrollment-form-panel">
      <h2 style="margin-bottom:1rem;">✨ የብራይት ፓዝ አካዳሚ ምዝገባ</h2>
      <div class="grid-double">
        <div class="input-group"><label>ሙሉ ስም *</label><input type="text" id="fullName" placeholder="አበበ በቀለ"></div>
        <div class="input-group"><label>ስልክ *</label><input type="tel" id="phone" placeholder="09XXXXXXXX"></div>
      </div>
      <div class="grid-double">
        <div class="input-group"><label>ኢሜል</label><input type="email" id="email" placeholder="student@example.com"></div>
        <div class="input-group"><label>ተቋም/ዩኒቨርሲቲ *</label><input type="text" id="institution" placeholder="ዩኒቨርሲቲ"></div>
      </div>
      <div class="input-group"><label>ቴሌግራም (አማራጭ)</label><input type="text" id="telegramUser" placeholder="@username"></div>

      <!-- Program Toggle -->
      <div class="program-switch" id="programSwitch">
        <div class="pill active" data-prog="freshman">🎓 ፍሬሽማን</div>
        <div class="pill" data-prog="remedial">📚 ሪሚዲያል</div>
      </div>

      <!-- Stream (Remedial only) -->
      <div id="streamBlock" style="display:none; margin-bottom:1rem;">
        <label>ስትሪም</label>
        <div style="display:flex; gap:1rem; margin-top:0.3rem;">
          <div class="pill stream-pill active" data-stream="natural">🔬 ናቸራል</div>
          <div class="pill stream-pill" data-stream="social">📖 ሶሻል</div>
        </div>
      </div>

      <!-- Price Freshman -->
      <div id="priceBlock" style="margin-bottom:1rem;">
        <label>ፓኬጅ</label>
        <div style="display:flex; gap:1rem;">
          <div class="pill price-pill" data-price="class">ክላስ ብቻ (300 ETB)</div>
          <div class="pill price-pill active" data-price="exam">ከኤግዛም ጋር (350 ETB)</div>
        </div>
      </div>

      <label>📖 ኮርሶች (አንድ ወይም ብዙ መምረጥ ይቻላል)</label>
      <div id="coursesContainer" class="course-grid-select"></div>

      <div class="input-group"><label>የክፍያ ማስረጃ ስክሪንሾት (አማራጭ)</label>
        <input type="file" id="paymentProof" accept="image/*,.pdf">
      </div>
      <button class="submit-btn" id="submitEnrollmentBtn"><i class="fas fa-save"></i> ምዝገባ አስገባ</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="panel">
    <div class="admin-header">
      <h2><i class="fas fa-users"></i> የተመዘገቡ ተማሪዎች</h2>
      <button class="export-btn" id="exportCSVBtn"><i class="fas fa-download"></i> እንደ CSV አውርድ</button>
    </div>
    <div class="stats-cards">
      <div class="stat-card">📊 ጠቅላላ ተማሪዎች: <strong id="totalCount">0</strong></div>
      <div class="stat-card">🎓 ፍሬሽማን: <strong id="freshmanCount">0</strong></div>
      <div class="stat-card">📚 ሪሚዲያል: <strong id="remedialCount">0</strong></div>
    </div>
    <div class="table-responsive">
      <table id="adminTable">
        <thead>
          <tr><th>ተ.ቁ</th><th>ሙሉ ስም</th><th>ስልክ</th><th>ተቋም</th><th>ፕሮግራም</th><th>ስትሪም</th><th>ኮርሶች</th><th>ጠቅላላ ዋጋ</th><th>የተመዘገበበት ጊዜ</th><th>ሰርዝ</th></tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ---------- COURSES DATA (with requested courses + added) ----------
  const freshmanCoursesAll = [
    "Communicative English", "Mathematics", "Physics", "Psychology", "Critical Thinking", "Geography",
    "Applied Mathematics", "History", "Emerging Technology", "Civics and Moral Education", "Anthropology", "English Skill 2", "Computer Programming"
  ];
  const remedialNaturalCourses = [
    "Biology", "Physics", "Chemistry", "English", "Mathematics", "Applied Mathematics",
    "Emerging Technology", "Computer Programming", "Civics and Moral Education"
  ];
  const remedialSocialCourses = [
    "Mathematics", "English", "Geography", "History", "Applied Mathematics",
    "Civics and Moral Education", "Anthropology", "English Skill 2", "Emerging Technology"
  ];

  // Global state
  let currentProgram = "freshman";
  let currentStream = "natural";
  let currentPrice = "exam"; // for freshman
  let availableCourses = [...freshmanCoursesAll];
  let selectedCoursesSet = new Set(freshmanCoursesAll.slice(0, 6)); // default 6

  // Admin data storage
  let registrations = [];

  // Load from localStorage
  function loadRegistrations() {
    const stored = localStorage.getItem("brightpath_registrations");
    if (stored) {
      registrations = JSON.parse(stored);
    } else {
      // demo data
      registrations = [];
    }
    renderAdminTable();
  }

  function saveRegistrations() {
    localStorage.setItem("brightpath_registrations", JSON.stringify(registrations));
    renderAdminTable();
  }

  // Helper compute total fee
  function computeTotalFee(program, priceType, selectedCount, stream) {
    if (program === "freshman") {
      let base = priceType === "exam" ? 350 : 300;
      let extra = Math.max(0, selectedCount - 6);
      return base + (extra * 30);
    } else {
      return selectedCount * 45;
    }
  }

  // Add new registration
  function addRegistration(formData) {
    const newId = Date.now();
    const registration = {
      id: newId,
      fullName: formData.fullName,
      phone: formData.phone,
      email: formData.email,
      institution: formData.institution,
      telegram: formData.telegram,
      program: formData.program,
      stream: formData.stream,
      selectedCourses: formData.selectedCourses,
      totalAmount: formData.totalAmount,
      timestamp: new Date().toISOString()
    };
    registrations.unshift(registration); // latest first
    saveRegistrations();
    return registration;
  }

  function deleteRegistration(id) {
    registrations = registrations.filter(reg => reg.id !== id);
    saveRegistrations();
  }

  function renderAdminTable() {
    const tbody = document.getElementById('adminTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    registrations.forEach((reg, idx) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = idx + 1;
      row.insertCell(1).innerText = reg.fullName;
      row.insertCell(2).innerText = reg.phone;
      row.insertCell(3).innerText = reg.institution;
      row.insertCell(4).innerText = reg.program === 'freshman' ? 'ፍሬሽማን' : 'ሪሚዲያል';
      row.insertCell(5).innerText = reg.stream === 'natural' ? 'ናቸራል' : (reg.stream === 'social' ? 'ሶሻል' : '—');
      row.insertCell(6).innerText = reg.selectedCourses.length + ' ኮርሶች';
      row.insertCell(7).innerText = reg.totalAmount + ' ETB';
      row.insertCell(8).innerText = new Date(reg.timestamp).toLocaleString();
      const deleteCell = row.insertCell(9);
      const delBtn = document.createElement('button');
      delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      delBtn.className = 'delete-btn';
      delBtn.onclick = () => { if(confirm('እርግጠኛ ነህ?')) deleteRegistration(reg.id); };
      deleteCell.appendChild(delBtn);
    });
    // update stats
    document.getElementById('totalCount').innerText = registrations.length;
    const freshmanTotal = registrations.filter(r => r.program === 'freshman').length;
    const remedialTotal = registrations.filter(r => r.program === 'remedial').length;
    document.getElementById('freshmanCount').innerText = freshmanTotal;
    document.getElementById('remedialCount').innerText = remedialTotal;
  }

  // Export CSV
  function exportToCSV() {
    if (registrations.length === 0) { alert("ምንም ውጤት የለም"); return; }
    let csvRows = [["ሙሉ ስም","ስልክ","ኢሜል","ተቋም","ፕሮግራም","ስትሪም","የኮርሶች ብዛት","ጠቅላላ ዋጋ","ቀን"]];
    for (let reg of registrations) {
      csvRows.push([
        reg.fullName, reg.phone, reg.email, reg.institution,
        reg.program === 'freshman' ? 'Freshman' : 'Remedial',
        reg.stream === 'natural' ? 'Natural' : (reg.stream === 'social' ? 'Social' : '-'),
        reg.selectedCourses.length, reg.totalAmount, new Date(reg.timestamp).toLocaleString()
      ]);
    }
    const csvContent = csvRows.map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute("download", "brightpath_registrations.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  // UI Rendering for Courses (checkboxes)
  function renderCourseCheckboxes() {
    const container = document.getElementById('coursesContainer');
    if (!container) return;
    container.innerHTML = '';
    availableCourses.forEach(course => {
      const isChecked = selectedCoursesSet.has(course);
      const div = document.createElement('div');
      div.className = 'course-check';
      div.innerHTML = `<input type="checkbox" value="${course.replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}> <span>${course}</span>`;
      const chk = div.querySelector('input');
      chk.addEventListener('change', () => {
        if (chk.checked) selectedCoursesSet.add(course);
        else selectedCoursesSet.delete(course);
      });
      container.appendChild(div);
    });
  }

  function updateCoursesByProgram() {
    if (currentProgram === 'freshman') {
      availableCourses = [...freshmanCoursesAll];
    } else {
      if (currentStream === 'natural') availableCourses = [...remedialNaturalCourses];
      else availableCourses = [...remedialSocialCourses];
    }
    // keep only existing courses in selected set
    const newSet = new Set();
    for (let c of selectedCoursesSet) {
      if (availableCourses.includes(c)) newSet.add(c);
    }
    if (newSet.size === 0 && availableCourses.length) newSet.add(availableCourses[0]);
    selectedCoursesSet = newSet;
    renderCourseCheckboxes();
  }

  function toggleSections() {
    const streamDiv = document.getElementById('streamBlock');
    const priceDiv = document.getElementById('priceBlock');
    if (currentProgram === 'freshman') {
      streamDiv.style.display = 'none';
      priceDiv.style.display = 'block';
    } else {
      streamDiv.style.display = 'block';
      priceDiv.style.display = 'none';
    }
    updateCoursesByProgram();
  }

  // Event listeners
  document.querySelectorAll('.pill[data-prog]').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-prog]').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentProgram = pill.dataset.prog;
      if (currentProgram === 'remedial' && currentStream !== 'natural') currentStream = 'natural';
      toggleSections();
      updateStreamPillsActive();
    });
  });

  function updateStreamPillsActive() {
    document.querySelectorAll('.stream-pill').forEach(p => {
      if (p.dataset.stream === currentStream) p.classList.add('active');
      else p.classList.remove('active');
    });
  }
  document.querySelectorAll('.stream-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      if (currentProgram !== 'remedial') return;
      currentStream = pill.dataset.stream;
      updateStreamPillsActive();
      updateCoursesByProgram();
    });
  });

  document.querySelectorAll('.price-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      if (currentProgram !== 'freshman') return;
      document.querySelectorAll('.price-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentPrice = pill.dataset.price;
    });
  });

  // Submit
  document.getElementById('submitEnrollmentBtn').addEventListener('click', () => {
    const fullName = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const institution = document.getElementById('institution').value.trim();
    if (!fullName || !phone || !institution) {
      alert("እባክዎ ሙሉ ስም፣ ስልክ እና ተቋም ይሙሉ");
      return;
    }
    if (selectedCoursesSet.size === 0) {
      alert("ቢያንስ አንድ ኮርስ ይምረጡ");
      return;
    }
    const total = computeTotalFee(currentProgram, currentPrice, selectedCoursesSet.size, currentStream);
    const streamValue = currentProgram === 'freshman' ? 'none' : currentStream;
    const newReg = {
      fullName, phone, email: document.getElementById('email').value.trim(),
      institution, telegram: document.getElementById('telegramUser').value.trim(),
      program: currentProgram,
      stream: streamValue,
      selectedCourses: Array.from(selectedCoursesSet),
      totalAmount: total
    };
    addRegistration(newReg);
    alert(`ምዝገባ ተሳክቷል! ለ ${fullName} ተመዝግቧል። በአድሚን ፓነል ይመልከቱ።`);
    // Reset form but keep selection as is? just clear inputs
    document.getElementById('fullName').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('email').value = '';
    document.getElementById('institution').value = '';
    document.getElementById('telegramUser').value = '';
    document.getElementById('paymentProof').value = '';
    // switch to admin tab to show result
    document.querySelector('[data-tab="admin"]').click();
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tabId = btn.dataset.tab;
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
      if (tabId === 'enroll') document.getElementById('enrollPanel').classList.add('active-panel');
      else document.getElementById('adminPanel').classList.add('active-panel');
      if (tabId === 'admin') renderAdminTable();
    });
  });

  document.getElementById('exportCSVBtn')?.addEventListener('click', exportToCSV);

  // Initialize UI
  function init() {
    loadRegistrations();
    toggleSections();
    updateStreamPillsActive();
    renderCourseCheckboxes();
  }
  init();
</script>
</body>
</html>
