<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bright Path Academy | Freshman & Remedial Enrollment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #0A1628, #020A17);
      font-family: 'Inter', sans-serif;
      padding: 1.5rem;
      min-height: 100vh;
    }

    .main-wrapper {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Tabs */
    .tabs-container {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .tab-btn.active {
      background: #F0A73A;
      color: #0A1628;
      box-shadow: 0 4px 12px rgba(240,167,58,0.3);
    }

    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.2);
    }

    .panel {
      display: none;
      background: #FFFFFF;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    }

    .panel.active-panel {
      display: block;
    }

    /* Admin Header */
    .admin-header {
      background: linear-gradient(115deg, #0F2B3D, #1B4A6E);
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-header h2 {
      color: white;
      font-weight: 700;
    }

    .export-btn {
      background: #F0A73A;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    .stats-cards {
      display: flex;
      gap: 1rem;
      padding: 1.2rem 2rem;
      background: #F8FBFE;
      border-bottom: 1px solid #E9F0F5;
      flex-wrap: wrap;
    }

    .stat-card {
      background: white;
      border-radius: 1rem;
      padding: 0.8rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #E9F0F5;
    }

    .table-responsive {
      overflow-x: auto;
      padding: 1rem 2rem 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    th, td {
      padding: 0.9rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid #E9F0F5;
    }

    th {
      background: #F1F5F9;
      font-weight: 700;
      color: #1F3E48;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background: #FEFBF5;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #e25c5c;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.3rem 0.6rem;
    }

    .view-btn {
      background: none;
      border: none;
      color: #1F6392;
      cursor: pointer;
      font-size: 1rem;
      margin-right: 0.5rem;
    }

    /* Enrollment Form */
    .enrollment-form-panel {
      padding: 2rem;
      background: white;
    }

    .grid-double {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .grid-triple {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.8rem;
      color: #1B4A6E;
      display: block;
      margin-bottom: 0.4rem;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid #E2EDF2;
      border-radius: 1rem;
      font-family: 'Inter', sans-serif;
      background: white;
    }

    .program-switch {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
    }

    .pill {
      background: #F1F5F9;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }

    .pill.active {
      background: #1F6392;
      color: white;
    }

    .course-grid-select {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.6rem;
      max-height: 280px;
      overflow-y: auto;
      margin: 1rem 0;
      padding: 0.5rem;
      border: 1px solid #E9F0F5;
      border-radius: 1rem;
      background: #FAFDFF;
    }

    .course-check {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem;
      background: #FFFFFF;
      border-radius: 0.8rem;
      cursor: pointer;
    }

    .course-check:hover {
      background: #F0F4F9;
    }

    .submit-btn {
      background: #136B47;
      color: white;
      width: 100%;
      padding: 1rem;
      border-radius: 2rem;
      font-weight: 700;
      border: none;
      margin-top: 1rem;
      cursor: pointer;
      font-size: 1rem;
    }

    .submit-btn:hover {
      background: #0D5539;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      max-width: 550px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .close-modal {
      float: right;
      cursor: pointer;
      font-size: 1.5rem;
    }

    @media (max-width: 700px) {
      .grid-double, .grid-triple {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="main-wrapper">
  <div class="tabs-container">
    <button class="tab-btn active" data-tab="enroll">📝 አዲስ ምዝገባ</button>
    <button class="tab-btn" data-tab="admin">👑 የአድሚን ዳሽቦርድ</button>
  </div>

  <!-- ENROLLMENT PANEL -->
  <div id="enrollPanel" class="panel active-panel">
    <div class="enrollment-form-panel">
      <h2 style="margin-bottom:1rem;">✨ ብራይት ፓዝ አካዳሚ - የምዝገባ ቅጽ</h2>
      
      <!-- Personal Info -->
      <div class="grid-double">
        <div class="input-group"><label>ሙሉ ስም *</label><input type="text" id="fullName" placeholder="አበበ በቀለ"></div>
        <div class="input-group"><label>ስልክ ቁጥር *</label><input type="tel" id="phone" placeholder="09XXXXXXXX"></div>
      </div>
      <div class="grid-double">
        <div class="input-group"><label>ኢሜል</label><input type="email" id="email" placeholder="student@example.com"></div>
        <div class="input-group"><label>ተቋም / ዩኒቨርሲቲ *</label><input type="text" id="institution" placeholder="ዩኒቨርሲቲ ስም"></div>
      </div>
      <div class="input-group"><label>ቴሌግራም ዩዘርኔም (አማራጭ)</label><input type="text" id="telegramUser" placeholder="@username"></div>

      <!-- Program Toggle -->
      <div class="program-switch" id="programSwitch">
        <div class="pill active" data-prog="freshman">🎓 ፍሬሽማን ፕሮግራም</div>
        <div class="pill" data-prog="remedial">📚 ሪሚዲያል ፕሮግራም</div>
      </div>

      <!-- Stream for Freshman (NEW) -->
      <div id="freshmanStreamBlock" style="display: block; margin-bottom: 1rem;">
        <label>📌 ስትሪም ምረጥ (ለፍሬሽማን)</label>
        <div style="display:flex; gap:1rem; margin-top:0.5rem;">
          <div class="pill freshman-stream-pill active" data-freshman-stream="natural">🔬 ናቸራል ሳይንስ</div>
          <div class="pill freshman-stream-pill" data-freshman-stream="social">📖 ሶሻል ሳይንስ</div>
        </div>
      </div>

      <!-- Stream for Remedial (original) -->
      <div id="remedialStreamBlock" style="display:none; margin-bottom:1rem;">
        <label>📌 ስትሪም ምረጥ (ለሪሚዲያል)</label>
        <div style="display:flex; gap:1rem; margin-top:0.5rem;">
          <div class="pill remedial-stream-pill active" data-remedial-stream="natural">🔬 ናቸራል ሳይንስ</div>
          <div class="pill remedial-stream-pill" data-remedial-stream="social">📖 ሶሻል ሳይንስ</div>
        </div>
      </div>

      <!-- Academic Year & Semester (NEW for Freshman) -->
      <div id="academicBlock" style="display: block; margin-bottom: 1rem;">
        <div class="grid-double">
          <div class="input-group">
            <label>📅 አካዳሚክ አመት</label>
            <select id="academicYear">
              <option value="1ኛ አመት">1ኛ አመት (1st Year)</option>
              <option value="2ኛ አመት">2ኛ አመት (2nd Year)</option>
            </select>
          </div>
          <div class="input-group">
            <label>📖 ሴሚስተር</label>
            <select id="semester">
              <option value="1ኛ ሴሚስተር">1ኛ ሴሚስተር (1st Semester)</option>
              <option value="2ኛ ሴሚስተር">2ኛ ሴሚስተር (2nd Semester)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Price Freshman -->
      <div id="priceBlock" style="margin-bottom:1rem;">
        <label>💰 የክፍያ ፓኬጅ</label>
        <div style="display:flex; gap:1rem; margin-top:0.5rem;">
          <div class="pill price-pill" data-price="class">📚 ክላስ ብቻ (300 ብር)</div>
          <div class="pill price-pill active" data-price="exam">📝 ከኤግዛም ጋር (350 ብር)</div>
        </div>
      </div>

      <label>📖 ኮርሶች (አንድ ወይም ብዙ መምረጥ ይቻላል)</label>
      <div id="coursesContainer" class="course-grid-select"></div>

      <div class="input-group"><label>📎 የክፍያ ማስረጃ (ስክሪንሾት) - አማራጭ</label>
        <input type="file" id="paymentProof" accept="image/*,.pdf">
      </div>
      <button class="submit-btn" id="submitEnrollmentBtn"><i class="fas fa-save"></i> ምዝገባ አስገባ</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="panel">
    <div class="admin-header">
      <h2><i class="fas fa-users"></i> የተመዘገቡ ተማሪዎች ዝርዝር</h2>
      <button class="export-btn" id="exportCSVBtn"><i class="fas fa-download"></i> እንደ CSV አውርድ</button>
    </div>
    <div class="stats-cards">
      <div class="stat-card">📊 ጠቅላላ ተማሪዎች: <strong id="totalCount">0</strong></div>
      <div class="stat-card">🎓 ፍሬሽማን: <strong id="freshmanCount">0</strong></div>
      <div class="stat-card">📚 ሪሚዲያል: <strong id="remedialCount">0</strong></div>
      <div class="stat-card">💰 አጠቃላይ ገቢ: <strong id="totalRevenue">0</strong> ብር</div>
    </div>
    <div class="table-responsive">
      <table id="adminTable">
        <thead>
          <tr><th>ተ.ቁ</th><th>ሙሉ ስም</th><th>ስልክ</th><th>ተቋም</th><th>ፕሮግራም</th><th>ስትሪም</th><th>አካዳሚክ አመት</th><th>ሴሚስተር</th><th>ኮርሶች</th><th>ጠቅላላ ዋጋ</th><th>ዝርዝር</th><th>ሰርዝ</th></tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
       </table>
    </div>
  </div>
</div>

<!-- Modal for details -->
<div id="detailsModal" class="modal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h3>📋 የተማሪ ዝርዝር መረጃ</h3>
    <div id="modalDetails"></div>
  </div>
</div>

<script>
  // ==================== COURSES DATA ====================
  // Freshman Natural Science Courses
  const freshmanNaturalCourses = [
    "Communicative English", "Mathematics", "Physics", "Psychology", "Critical Thinking", "Geography",
    "Applied Mathematics", "Emerging Technology", "Computer Programming", "General Biology"
  ];
  
  // Freshman Social Science Courses
  const freshmanSocialCourses = [
    "Communicative English", "Mathematics", "Psychology", "Critical Thinking", "Geography",
    "History", "Civics and Moral Education", "Anthropology", "English Skill 2", "Economics"
  ];
  
  // Remedial Courses
  const remedialNaturalCourses = [
    "Biology", "Physics", "Chemistry", "English", "Mathematics", "Applied Mathematics",
    "Emerging Technology", "Computer Programming", "Civics and Moral Education"
  ];
  const remedialSocialCourses = [
    "Mathematics", "English", "Geography", "History", "Applied Mathematics",
    "Civics and Moral Education", "Anthropology", "English Skill 2", "Emerging Technology"
  ];

  // State
  let currentProgram = "freshman";
  let currentFreshmanStream = "natural";    // for freshman
  let currentRemedialStream = "natural";    // for remedial
  let currentPrice = "exam";
  let availableCourses = [...freshmanNaturalCourses];
  let selectedCoursesSet = new Set(freshmanNaturalCourses.slice(0, 5));

  // Admin data
  let registrations = [];

  // Load from localStorage
  function loadRegistrations() {
    const stored = localStorage.getItem("brightpath_registrations_v2");
    if (stored) {
      registrations = JSON.parse(stored);
    } else {
      registrations = [];
    }
    renderAdminTable();
  }

  function saveRegistrations() {
    localStorage.setItem("brightpath_registrations_v2", JSON.stringify(registrations));
    renderAdminTable();
  }

  // Get current stream based on program
  function getCurrentStream() {
    if (currentProgram === "freshman") {
      return currentFreshmanStream;
    } else {
      return currentRemedialStream;
    }
  }

  function computeTotalFee(program, priceType, selectedCount) {
    if (program === "freshman") {
      let base = priceType === "exam" ? 350 : 300;
      let extra = Math.max(0, selectedCount - 6);
      return base + (extra * 30);
    } else {
      return selectedCount * 45;
    }
  }

  // Update available courses based on program and stream
  function updateAvailableCourses() {
    if (currentProgram === "freshman") {
      if (currentFreshmanStream === "natural") {
        availableCourses = [...freshmanNaturalCourses];
      } else {
        availableCourses = [...freshmanSocialCourses];
      }
    } else {
      if (currentRemedialStream === "natural") {
        availableCourses = [...remedialNaturalCourses];
      } else {
        availableCourses = [...remedialSocialCourses];
      }
    }
    
    // Keep only valid selections
    const newSet = new Set();
    for (let c of selectedCoursesSet) {
      if (availableCourses.includes(c)) newSet.add(c);
    }
    if (newSet.size === 0 && availableCourses.length) {
      newSet.add(availableCourses[0]);
    }
    selectedCoursesSet = newSet;
    renderCourseCheckboxes();
  }

  function renderCourseCheckboxes() {
    const container = document.getElementById('coursesContainer');
    if (!container) return;
    container.innerHTML = '';
    availableCourses.forEach(course => {
      const isChecked = selectedCoursesSet.has(course);
      const div = document.createElement('div');
      div.className = 'course-check';
      div.innerHTML = `<input type="checkbox" value="${course.replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}> <span>${course}</span>`;
      const chk = div.querySelector('input');
      chk.addEventListener('change', () => {
        if (chk.checked) selectedCoursesSet.add(course);
        else selectedCoursesSet.delete(course);
      });
      container.appendChild(div);
    });
  }

  // Toggle UI sections based on program
  function toggleSections() {
    const freshmanStreamDiv = document.getElementById('freshmanStreamBlock');
    const remedialStreamDiv = document.getElementById('remedialStreamBlock');
    const academicBlock = document.getElementById('academicBlock');
    const priceDiv = document.getElementById('priceBlock');
    
    if (currentProgram === 'freshman') {
      freshmanStreamDiv.style.display = 'block';
      remedialStreamDiv.style.display = 'none';
      academicBlock.style.display = 'block';
      priceDiv.style.display = 'block';
    } else {
      freshmanStreamDiv.style.display = 'none';
      remedialStreamDiv.style.display = 'block';
      academicBlock.style.display = 'none';
      priceDiv.style.display = 'none';
    }
    updateAvailableCourses();
  }

  // Event Listeners
  // Program selection
  document.querySelectorAll('.pill[data-prog]').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill[data-prog]').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentProgram = pill.dataset.prog;
      toggleSections();
      updateFreshmanStreamPillsActive();
      updateRemedialStreamPillsActive();
    });
  });

  // Freshman stream pills
  function updateFreshmanStreamPillsActive() {
    document.querySelectorAll('.freshman-stream-pill').forEach(p => {
      if (p.dataset.freshmanStream === currentFreshmanStream) p.classList.add('active');
      else p.classList.remove('active');
    });
  }
  
  document.querySelectorAll('.freshman-stream-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      if (currentProgram !== 'freshman') return;
      currentFreshmanStream = pill.dataset.freshmanStream;
      updateFreshmanStreamPillsActive();
      updateAvailableCourses();
    });
  });

  // Remedial stream pills
  function updateRemedialStreamPillsActive() {
    document.querySelectorAll('.remedial-stream-pill').forEach(p => {
      if (p.dataset.remedialStream === currentRemedialStream) p.classList.add('active');
      else p.classList.remove('active');
    });
  }
  
  document.querySelectorAll('.remedial-stream-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      if (currentProgram !== 'remedial') return;
      currentRemedialStream = pill.dataset.remedialStream;
      updateRemedialStreamPillsActive();
      updateAvailableCourses();
    });
  });

  // Price pills
  document.querySelectorAll('.price-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      if (currentProgram !== 'freshman') return;
      document.querySelectorAll('.price-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentPrice = pill.dataset.price;
    });
  });

  function addRegistration(formData) {
    const newId = Date.now();
    const registration = {
      id: newId,
      fullName: formData.fullName,
      phone: formData.phone,
      email: formData.email,
      institution: formData.institution,
      telegram: formData.telegram,
      program: formData.program,
      stream: formData.stream,
      academicYear: formData.academicYear,
      semester: formData.semester,
      selectedCourses: formData.selectedCourses,
      totalAmount: formData.totalAmount,
      timestamp: new Date().toISOString()
    };
    registrations.unshift(registration);
    saveRegistrations();
    return registration;
  }

  function deleteRegistration(id) {
    if (confirm("እርግጠኛ ነህ? ይህን ምዝገባ መሰረዝ ትፈልጋለህ?")) {
      registrations = registrations.filter(reg => reg.id !== id);
      saveRegistrations();
    }
  }

  function showDetails(reg) {
    const modal = document.getElementById('detailsModal');
    const modalDetails = document.getElementById('modalDetails');
    modalDetails.innerHTML = `
      <p><strong>👤 ሙሉ ስም:</strong> ${reg.fullName}</p>
      <p><strong>📞 ስልክ:</strong> ${reg.phone}</p>
      <p><strong>📧 ኢሜል:</strong> ${reg.email || '—'}</p>
      <p><strong>🏫 ተቋም:</strong> ${reg.institution}</p>
      <p><strong>💬 ቴሌግራም:</strong> ${reg.telegram || '—'}</p>
      <p><strong>🎓 ፕሮግራም:</strong> ${reg.program === 'freshman' ? 'ፍሬሽማን' : 'ሪሚዲያል'}</p>
      <p><strong>📚 ስትሪም:</strong> ${reg.stream === 'natural' ? 'ናቸራል ሳይንስ' : 'ሶሻል ሳይንስ'}</p>
      ${reg.academicYear ? `<p><strong>📅 አካዳሚክ አመት:</strong> ${reg.academicYear}</p>` : ''}
      ${reg.semester ? `<p><strong>📖 ሴሚስተር:</strong> ${reg.semester}</p>` : ''}
      <p><strong>📖 የተመረጡ ኮርሶች (${reg.selectedCourses.length}):</strong></p>
      <ul>${reg.selectedCourses.map(c => `<li>${c}</li>`).join('')}</ul>
      <p><strong>💰 ጠቅላላ ዋጋ:</strong> ${reg.totalAmount} ብር</p>
      <p><strong>📅 የተመዘገበበት ቀን:</strong> ${new Date(reg.timestamp).toLocaleString()}</p>
    `;
    modal.style.display = 'flex';
  }

  function renderAdminTable() {
    const tbody = document.getElementById('adminTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    
    let totalRevenue = 0;
    let freshmanTotal = 0;
    let remedialTotal = 0;
    
    registrations.forEach((reg, idx) => {
      totalRevenue += reg.totalAmount;
      if (reg.program === 'freshman') freshmanTotal++;
      else remedialTotal++;
      
      const row = tbody.insertRow();
      row.insertCell(0).innerText = idx + 1;
      row.insertCell(1).innerText = reg.fullName;
      row.insertCell(2).innerText = reg.phone;
      row.insertCell(3).innerText = reg.institution;
      row.insertCell(4).innerText = reg.program === 'freshman' ? 'ፍሬሽማን' : 'ሪሚዲያል';
      row.insertCell(5).innerText = reg.stream === 'natural' ? 'ናቸራል' : 'ሶሻል';
      row.insertCell(6).innerText = reg.academicYear || '—';
      row.insertCell(7).innerText = reg.semester || '—';
      row.insertCell(8).innerHTML = `${reg.selectedCourses.length} ኮርሶች`;
      row.insertCell(9).innerHTML = `<strong>${reg.totalAmount} ብር</strong>`;
      
      const actionCell = row.insertCell(10);
      const viewBtn = document.createElement('button');
      viewBtn.innerHTML = '<i class="fas fa-eye"></i>';
      viewBtn.className = 'view-btn';
      viewBtn.title = 'ዝርዝር ማየት';
      viewBtn.onclick = () => showDetails(reg);
      actionCell.appendChild(viewBtn);
      
      const delBtn = document.createElement('button');
      delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
      delBtn.className = 'delete-btn';
      delBtn.title = 'ሰርዝ';
      delBtn.onclick = () => deleteRegistration(reg.id);
      actionCell.appendChild(delBtn);
    });
    
    document.getElementById('totalCount').innerText = registrations.length;
    document.getElementById('freshmanCount').innerText = freshmanTotal;
    document.getElementById('remedialCount').innerText = remedialTotal;
    document.getElementById('totalRevenue').innerText = totalRevenue;
  }

  function exportToCSV() {
    if (registrations.length === 0) { alert("ምንም የተመዘገበ ተማሪ የለም"); return; }
    let csvRows = [["ሙሉ ስም","ስልክ","ኢሜል","ተቋም","ፕሮግራም","ስትሪም","አካዳሚክ አመት","ሴሚስተር","የኮርሶች ብዛት","ኮርሶች","ጠቅላላ ዋጋ","የተመዘገበበት ቀን"]];
    for (let reg of registrations) {
      csvRows.push([
        reg.fullName, reg.phone, reg.email, reg.institution,
        reg.program === 'freshman' ? 'Freshman' : 'Remedial',
        reg.stream === 'natural' ? 'Natural' : 'Social',
        reg.academicYear || '-',
        reg.semester || '-',
        reg.selectedCourses.length,
        reg.selectedCourses.join("; "),
        reg.totalAmount,
        new Date(reg.timestamp).toLocaleString()
      ]);
    }
    const csvContent = csvRows.map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute("download", "brightpath_registrations.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
  }

  // Submit
  document.getElementById('submitEnrollmentBtn').addEventListener('click', () => {
    const fullName = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const institution = document.getElementById('institution').value.trim();
    if (!fullName || !phone || !institution) {
      alert("እባክዎ ሙሉ ስም፣ ስልክ ቁጥር እና ተቋም ይሙሉ");
      return;
    }
    if (selectedCoursesSet.size === 0) {
      alert("እባክዎ ቢያንስ አንድ ኮርስ ይምረጡ");
      return;
    }
    
    const currentStreamValue = getCurrentStream();
    const total = computeTotalFee(currentProgram, currentPrice, selectedCoursesSet.size);
    const academicYear = document.getElementById('academicYear').value;
    const semester = document.getElementById('semester').value;
    
    const newReg = {
      fullName, 
      phone, 
      email: document.getElementById('email').value.trim(),
      institution, 
      telegram: document.getElementById('telegramUser').value.trim(),
      program: currentProgram,
      stream: currentStreamValue,
      academicYear: currentProgram === 'freshman' ? academicYear : null,
      semester: currentProgram === 'freshman' ? semester : null,
      selectedCourses: Array.from(selectedCoursesSet),
      totalAmount: total
    };
    addRegistration(newReg);
    alert(`✅ ምዝገባ ተሳክቷል!\n\nለ ${fullName} በተሳካ ሁኔታ ተመዝግቧል።\nጠቅላላ ክፍያ: ${total} ብር\n\nውጤቱን በአድሚን ዳሽቦርድ ትር ውስጥ ይመልከቱ።`);
    
    // Reset form
    document.getElementById('fullName').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('email').value = '';
    document.getElementById('institution').value = '';
    document.getElementById('telegramUser').value = '';
    document.getElementById('paymentProof').value = '';
    
    // Reset course selection to default
    selectedCoursesSet = new Set(availableCourses.slice(0, 5));
    renderCourseCheckboxes();
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tabId = btn.dataset.tab;
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active-panel'));
      if (tabId === 'enroll') document.getElementById('enrollPanel').classList.add('active-panel');
      else document.getElementById('adminPanel').classList.add('active-panel');
      if (tabId === 'admin') renderAdminTable();
    });
  });

  document.getElementById('exportCSVBtn')?.addEventListener('click', exportToCSV);
  
  // Modal close
  document.querySelector('.close-modal')?.addEventListener('click', () => {
    document.getElementById('detailsModal').style.display = 'none';
  });
  window.addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailsModal')) {
      document.getElementById('detailsModal').style.display = 'none';
    }
  });

  function init() {
    loadRegistrations();
    toggleSections();
    updateFreshmanStreamPillsActive();
    updateRemedialStreamPillsActive();
    renderCourseCheckboxes();
  }
  init();
</script>
</body>
</html>
